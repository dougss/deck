name: Bug Report
description: Report a bug or unexpected behavior in Deck
title: "[Bug] "
labels: ["bug", "needs triage"]
body:
  - type: input
    id: deck_version
    attributes:
      label: Deck version
      placeholder: "e.g. v0.3.0-beta.8"
    validations:
      required: true

  - type: input
    id: macos_version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.4 Sequoia"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Intel x64
        - Apple Silicon via Rosetta 2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Deck
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?

  - type: textarea
    id: screenshots_logs
    attributes:
      label: Screenshots / logs
      description: Add screenshots or paste relevant log output. Logs are in `~/Library/Logs/Deck/`.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem.
